<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Robot Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="bg-orb bg-orb-a"></div>
    <div class="bg-orb bg-orb-b"></div>

    <main class="shell">
        <header class="header">
            <div>
                <p class="eyebrow">Robot Interface</p>
                <h1>Camera + Chat Console</h1>
            </div>
            <div class="status-bar">
                <span id="camera-status" class="pill">Camera: checking...</span>
                <span id="robot-status" class="pill">Robot: checking...</span>
                <span id="sim-status" class="pill muted">Mode: unknown</span>
                <label class="camera-id-control" for="camera-id-input">
                    Camera ID
                    <input id="camera-id-input" type="number" min="0" step="1" value="0">
                </label>
                <button id="camera-apply-id-btn" class="pill" type="button">Set ID</button>
                <button id="camera-toggle-id-btn" class="pill" type="button">Next ID</button>
                <button id="camera-restart-btn" class="pill" type="button">Restart</button>
            </div>
        </header>

        <section class="grid">
            <article class="panel camera-panel">
                <div class="panel-top">
                    <h2>Live Camera</h2>
                    <p>Live feed from the selected camera source.</p>
                </div>
                <div class="camera-frame">
                    <img id="camera-feed" src="/api/video_feed" alt="Robot camera feed">
                </div>
            </article>

            <article class="panel chat-panel">
                <div class="panel-top chat-head">
                    <div>
                        <h2>Robot Chat</h2>
                        <p>Send direct instructions to the robot.</p>
                    </div>
                    <label class="mode-select" for="chat-mode">
                        Chat Mode
                        <select id="chat-mode">
                            <option value="local" selected>Local Parser (No API key)</option>
                            <option value="openai">AI Interpreter (API key required)</option>
                        </select>
                    </label>
                </div>

                <div id="messages" class="messages" aria-live="polite"></div>

                <div class="quick-actions">
                    <button class="chip" data-command="connect">Connect</button>
                    <button class="chip" data-command="read positions">Read Positions</button>
                    <button class="chip" data-command="home">Home</button>
                    <button class="chip" data-command="open gripper">Open Gripper</button>
                    <button class="chip" data-command="close gripper">Close Gripper</button>
                    <button class="chip" data-command="disconnect">Disconnect</button>
                </div>

                <form id="chat-form" class="chat-form">
                    <input
                        id="chat-input"
                        type="text"
                        placeholder="Example: move base to 2300"
                        autocomplete="off"
                        required
                    >
                    <button id="send-btn" type="submit">Send</button>
                </form>
            </article>
        </section>
    </main>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
